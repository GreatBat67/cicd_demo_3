name: "Snowflake DCM Infrastructure Pipeline - MAIN"
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
    paths:
      - "dcm_automation/.**"
      - "dcm_automation/**"
  push:
    branches:
      - main
    paths:
      - "dcm_automation/.**"
      - "dcm_automation/**"

permissions:
  id-token: write
  contents: read

jobs:
  dcm-orchestration:
    if: (github.base_ref == 'main' && github.event_name == 'pull_request') || (github.ref_name == 'main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4
      - name: Setup Snowflake CLI (OIDC)
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          use-oidc: true
      - name: Execute Parameterized Infrastructure Plan/Deploy Loop
        env:
          SNOWFLAKE_ACCOUNT: "${{ vars.SNOWFLAKE_ACCOUNT }}"
          SNOWFLAKE_ROLE: "${{ vars.SNOWFLAKE_ROLE }}"
          SNOWFLAKE_USER: "${{ vars.SNOWFLAKE_USER }}"
          SNOWFLAKE_WAREHOUSE: "${{ vars.SNOWFLAKE_WAREHOUSE }}"
          SNOWFLAKE_DATABASES: "${{ vars.SNOWFLAKE_DATABASES }}"
          SNOWFLAKE_SCHEMAS: "${{ vars.SNOWFLAKE_SCHEMAS }}"
        run: |
          ACTION_MODE="PLAN"
          if [ "${{ github.event_name }}" = "push" ]; then ACTION_MODE="DEPLOY"; fi
          
          IFS=',' read -r -a db_array <<< "$SNOWFLAKE_DATABASES"
          IFS=',' read -r -a schema_array <<< "$SNOWFLAKE_SCHEMAS"
          
          cd "${{ vars.DCM_PROJECT_DIR }}"
          
          for db in "${db_array[@]}"; do
            for schema in "${schema_array[@]}"; do
              export SNOWFLAKE_DATABASE="$db"
              export SNOWFLAKE_SCHEMA="$schema"
              
              export SNOWFLAKE_QUERY_TAG="GH_RUNNER_MAIN_DCM_${ACTION_MODE}_${db}_${schema}_RUN_${{ github.run_number }}"
              echo "➔ Processing DCM Infrastructure Target [${ACTION_MODE}] Matrix Context: DB=$db | SCHEMA=$schema | ALIAS=$SNOWFLAKE_QUERY_TAG"
              
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                snow dcm plan --target "${{ vars.DCM_TARGET }}" -x
              else
                snow dcm deploy --target "${{ vars.DCM_TARGET }}" -x
              fi
            done
          done
